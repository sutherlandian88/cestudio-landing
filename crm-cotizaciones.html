    return td;
  }

  // SELECT cell — fuente badge
  function fuenteTd() {
    const td = document.createElement('td');
    td.className = 'td-click';
    const show = () => {
      const cls = FUENTE_CLASS[l.fuente] || 'fuente-otro';
      td.innerHTML = l.fuente ? `<span class="t-badge ${cls}" style="cursor:pointer">${l.fuente}</span>` : DASH;
    };
    show();
    td.addEventListener('click', () => {
      if (td.querySelector('select')) return;
      const sel = document.createElement('select');
      sel.style.cssText = 'font-size:11px;border:1.5px solid #111;border-radius:5px;padding:2px 4px;font-family:inherit;outline:none;background:#fff;';
      FUENTE_OPTIONS.forEach(f => {
        const o = document.createElement('option');
        o.value = f; o.textContent = f || '—';
        if (f === l.fuente) o.selected = true;
        sel.appendChild(o);
      });
      td.innerHTML = ''; td.appendChild(sel); sel.focus();
      sel.addEventListener('change', () => { l.fuente = sel.value; saveLead(l); show(); });
      sel.addEventListener('blur', show);
    });
    return td;
  }

  // SELECT cell — etapa/stage
  function stageTd() {
    const td = document.createElement('td');
    td.className = 'td-click';
    const show = () => {
      const cls = 'stage-' + (l.columna || 'nuevo');
      td.innerHTML = `<span class="t-stage ${cls}" style="cursor:pointer">${STAGE_LABELS[l.columna] || l.columna}</span>`;
    };
    show();
    td.addEventListener('click', () => {
      if (td.querySelector('select')) return;
      const sel = document.createElement('select');
      sel.style.cssText = 'font-size:11px;border:1.5px solid #111;border-radius:5px;padding:2px 4px;font-family:inherit;outline:none;background:#fff;';
      COLUMNS.forEach(c => {
        const o = document.createElement('option');
        o.value = c.id; o.textContent = c.label;
        if (c.id === l.columna) o.selected = true;
        sel.appendChild(o);
      });
      td.innerHTML = ''; td.appendChild(sel); sel.focus();
      sel.addEventListener('change', () => {
        l.columna = sel.value;
        tr.className = l.columna === 'emitida' ? 'row-emitida' : l.columna === 'perdido' ? 'row-perdido' : '';
        saveLead(l);
        renderStats();
        show();
      });
      sel.addEventListener('blur', show);
    });
    return td;
  }

  // BOOL cell — toggle on click
  function boolTd(field) {
    const td = document.createElement('td');
    td.className = 't-check td-click'; td.title = 'Click para cambiar';
    const show = () => { td.innerHTML = l[field] ? '✓' : DASH; };
    show();
    td.addEventListener('click', () => { l[field] = !l[field]; show(); saveLead(l); });
    return td;
  }

  // Vehicle (composite) — opens modal for Marca/Modelo/Año
  function vehicleTd() {
    const td = document.createElement('td');
    td.className = 't-vehicle td-click'; td.title = 'Editar con ✏';
    td.style.color = '#888';
    td.textContent = [l.marca, l.modelo, l.anio].filter(Boolean).join(' ') || '—';
    td.addEventListener('click', () => openModal(l.id));
    return td;
  }

  // TELEFONO cell with inline WA button
  function telefonTd() {
    const td = document.createElement('td');
    td.className = 't-muted';
    td.style.cssText = 'font-size:11px;white-space:nowrap;';
    const show = () => {
      if (l.telefono) {
        const raw = l.telefono.replace(/\D/g,'');
        const num = raw.startsWith('56') ? raw : '56' + raw;
        td.innerHTML = `${esc(l.telefono)} <a href="https://wa.me/${num}" target="_blank" title="WhatsApp" style="color:#15803d;text-decoration:none;font-size:13px;vertical-align:middle;" onclick="event.stopPropagation()">💬</a>`;
      } else {
        td.innerHTML = '<span style="color:#ddd">—</span>';
      }
    };
    show();
    td.addEventListener('click', () => {
      if (td.querySelector('input')) return;
      const inp = document.createElement('input');
      inp.type = 'tel'; inp.value = l.telefono || '';
      inp.style.cssText = 'font-size:11px;border:1.5px solid #111;border-radius:5px;padding:2px 4px;font-family:inherit;outline:none;width:130px;';
      td.innerHTML = ''; td.appendChild(inp); inp.focus();
      inp.addEventListener('blur', () => { l.telefono = inp.value.trim(); saveLead(l); show(); });
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); inp.blur(); } });
    });
    return td;
  }

  tr.appendChild(dateTd('fecha'));
  tr.appendChild(textTd('asegurado', 't-asegurado'));
  tr.appendChild(telefonTd());
  tr.appendChild(textTd('rut', 't-muted', 'font-size:11px'));
  tr.appendChild(fuenteTd());
  tr.appendChild(vehicleTd());
  tr.appendChild(textTd('patente', ''));
  tr.appendChild(boolTd('polizaVigente'));
  tr.appendChild(numTd('primaVigente', false));
  tr.appendChild(numTd('deducibleActual', false));
  tr.appendChild(dateTd('fechaCotizacion'));
  tr.appendChild(textTd('compania', ''));
  tr.appendChild(numTd('primaNeta', true));
  tr.appendChild(textTd('accionSeguimiento', '', 'max-width:140px'));
  tr.appendChild(boolTd('cierre'));
  tr.appendChild(dateTd('fechaEmision'));
  tr.appendChild(textTd('comentarios', '', 'max-width:160px;color:#aaa'));
  tr.appendChild(stageTd());

  return tr;
}

function initColumnDrag(thead) {
  let dragSrcIdx = null;
  const ths = () => [...thead.querySelectorAll('th')];
  thead.querySelectorAll('th[data-key]').forEach(th => {
    th.draggable = true;
    th.addEventListener('dragstart', e => {
      dragSrcIdx = ths().indexOf(th);
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => th.classList.add('col-dragging'), 0);
    });
    th.addEventListener('dragend', () => {
      th.classList.remove('col-dragging');
      ths().forEach(t => t.classList.remove('col-drag-over'));
      dragSrcIdx = null;
    });
    th.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      ths().forEach(t => t.classList.remove('col-drag-over'));
      th.classList.add('col-drag-over');
    });
    th.addEventListener('dragleave', () => th.classList.remove('col-drag-over'));
    th.addEventListener('drop', e => {
      e.preventDefault();
      th.classList.remove('col-drag-over');
      const allThs = ths();
      const dropIdx = allThs.indexOf(th);
      if (dragSrcIdx === null || dragSrcIdx === dropIdx) return;
      const dragged = allThs[dragSrcIdx];
      if (dragSrcIdx < dropIdx) th.after(dragged); else th.before(dragged);
      // Reorder cells in every body row to match
      const tbody = document.getElementById('leadsTableBody');
      tbody.querySelectorAll('tr').forEach(tr => {
        const tds = [...tr.children];
        if (tds.length <= Math.max(dragSrcIdx, dropIdx)) return;
        const movedTd = tds[dragSrcIdx];
        if (dragSrcIdx < dropIdx) tds[dropIdx].after(movedTd);
        else tds[dropIdx].before(movedTd);
      });
    });
  });
}

function renderTable() {
  if (activeTab !== 'tabla') return;
  const leads = sortedLeads();
  const tbody = document.getElementById('leadsTableBody');
  const thead = document.querySelector('#leadsTable thead');
  if (!tbody || !thead) return;

  // Build header (rebuild when switching vertical)
  if (!thead.children.length) {
    const cols = getTableCols();
    const tr = document.createElement('tr');
    tr.innerHTML = '<th class="t-actions no-sort"></th>' +
      cols.map(c =>
        `<th data-key="${c.key}" class="${!c.sort ? 'no-sort' : ''}">
          ${c.label}${c.sort ? `<span class="sort-arrow">↕</span>` : ''}
        </th>`
      ).join('');
    thead.appendChild(tr);
    thead.querySelectorAll('th[data-key]').forEach(th => {
      th.addEventListener('click', () => {
        const col = getTableCols().find(c => c.key === th.dataset.key);
        if (!col?.sort) return;
        if (sortCol === th.dataset.key) sortDir *= -1;
        else { sortCol = th.dataset.key; sortDir = 1; }
        renderTable();
      });
    });
    initColumnDrag(thead);
  }

  // Update sort indicators
  thead.querySelectorAll('th[data-key]').forEach(th => {
    th.classList.toggle('sort-active', th.dataset.key === sortCol);
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = th.dataset.key === sortCol ? (sortDir > 0 ? '↑' : '↓') : '↕';
  });

  document.getElementById('tableCount').textContent = `${leads.length} lead${leads.length !== 1 ? 's' : ''}`;
  tbody.innerHTML = '';

  if (!leads.length) {
    tbody.innerHTML = `<tr><td colspan="${getTableCols().length + 1}" class="table-empty">Sin leads — agrega el primero con el botón de abajo</td></tr>`;
    return;
  }

  leads.forEach(l => tbody.appendChild(buildEditableRow(l)));
}

document.getElementById('addRowBtn').addEventListener('click', () => openModal(null));

// ── Dashboard ─────────────────────────────────────────────
let _charts = {};
function renderDashboard() {
  if (activeTab !== 'dashboard') return;
  const all  = Object.values(STATE).filter(l => l && l.id);
  const emit = all.filter(l => l.columna === 'emitida');
  const perd = all.filter(l => l.columna === 'perdido');
  const cerr = emit.length + perd.length;
  const primaTotal = emit.reduce((s,l) => s+(parseFloat(l.primaNeta)||0), 0);

  document.getElementById('dTotal').textContent     = all.length;
  document.getElementById('dEmitidas').textContent  = emit.length;
  document.getElementById('dPrimaTotal').textContent= fmtPrima(primaTotal) || '$0';
  document.getElementById('dTasa').textContent      = cerr ? Math.round(emit.length/cerr*100)+'%' : '—';

  const mkChart = (id, type, data, opts={}) => {
    if (_charts[id]) _charts[id].destroy();
    const ctx = document.getElementById(id);
    if (!ctx) return;
    _charts[id] = new Chart(ctx, { type, data, options: { responsive:true, plugins:{ legend:{ labels:{ font:{size:11} } } }, ...opts } });
  };

  // Leads por fuente (donut)
  const byFuente = {};
  all.forEach(l => { const f = l.fuente||'Sin fuente'; byFuente[f] = (byFuente[f]||0)+1; });
  mkChart('chartFuente','doughnut',{
    labels: Object.keys(byFuente),
    datasets:[{ data:Object.values(byFuente), backgroundColor:['#6366f1','#f59e0b','#10b981','#ef4444','#8b5cf6','#0ea5e9','#f97316'] }]
  },{ cutout:'58%', plugins:{ legend:{ position:'right', labels:{ font:{size:10} } } } });

  // Embudo (horizontal bar)
  const stgOrder = ['nuevo','cotizando','propuesta','seguimiento','emitida','perdido'];
  mkChart('chartEmbudo','bar',{
    labels: stgOrder.map(s => STAGE_LABELS[s]),
    datasets:[{ data:stgOrder.map(s=>all.filter(l=>l.columna===s).length), backgroundColor:['#9ca3af','#3b82f6','#7c3aed','#f59e0b','#22c55e','#ef4444'], borderRadius:4 }]
  },{ indexAxis:'y', plugins:{ legend:{display:false} }, scales:{ x:{ ticks:{font:{size:10}} }, y:{ ticks:{font:{size:10}} } } });

  // Prima emitida por mes (bar)
  const primaByM = {};
  emit.forEach(l => { const m=(l.fechaEmision||l.fecha||'').slice(0,7); if(m) primaByM[m]=(primaByM[m]||0)+(parseFloat(l.primaNeta)||0); });
  const pm = Object.keys(primaByM).sort();
  const mLabel = m => { const [y,mo]=m.split('-'); return ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][+mo-1]+' '+y.slice(2); };
  mkChart('chartPrima','bar',{
    labels: pm.map(mLabel),
    datasets:[{ data:pm.map(m=>Math.round(primaByM[m]/1000)), backgroundColor:'#22c55e', borderRadius:4, label:'Prima (miles $)' }]
  },{ plugins:{ legend:{display:false} }, scales:{ y:{ ticks:{font:{size:10}, callback:v=>'$'+v+'k'} }, x:{ ticks:{font:{size:10}} } } });

  // Leads por mes (line)
  const leadsByM = {};
  all.forEach(l => { const m=(l.fecha||'').slice(0,7); if(m) leadsByM[m]=(leadsByM[m]||0)+1; });
  const lm = Object.keys(leadsByM).sort();
  mkChart('chartLeads','line',{
    labels: lm.map(mLabel),
    datasets:[{ data:lm.map(m=>leadsByM[m]), borderColor:'#6366f1', backgroundColor:'rgba(99,102,241,0.08)', fill:true, tension:0.35, pointRadius:4 }]
  },{ plugins:{ legend:{display:false} }, scales:{ y:{ ticks:{font:{size:10}} }, x:{ ticks:{font:{size:10}} } } });
}

// ── Toast ─────────────────────────────────────────────────
function showToast(msg, type = 'success', duration = 2500) {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => {
    t.classList.add('out');
    setTimeout(() => t.remove(), 230);
  }, duration);
}

// ── Panel "Para hoy" ──────────────────────────────────────
function renderTodayPanel() {
  const panel = document.getElementById('todayPanel');
  if (!panel) return;
  const now = today();
  const active = Object.values(STATE).filter(l => l && l.id && !['emitida','perdido'].includes(l.columna));
  const vencidos = active.filter(l => l.fechaSeguimiento && l.fechaSeguimiento < now);
  const hoy = active.filter(l => l.fechaSeguimiento && l.fechaSeguimiento === now);
  const frios = active.filter(l => coldDays(l) >= COLD_THRESHOLD);

  if (!vencidos.length && !hoy.length && !frios.length) {
    panel.classList.add('hidden'); return;
  }
  panel.classList.remove('hidden');
  let html = '<span class="today-panel-lbl">🗓 Para hoy</span>';
  const leadName = VERTICAL_CONFIG[VERTICAL].leadName;
  vencidos.forEach(l => {
    const days = Math.round((new Date(now+'T00:00:00') - new Date(l.fechaSeguimiento+'T00:00:00')) / 86400000);
    html += `<button class="today-chip vencida" data-id="${l.id}">⚠ ${esc(leadName(l))} — seguimiento vencido hace ${days}d</button>`;
  });
  hoy.forEach(l => {
    html += `<button class="today-chip hoy" data-id="${l.id}">🔔 ${esc(leadName(l))} — seguimiento hoy</button>`;
  });
  if (frios.length) {
    html += `<button class="today-chip fria" data-id="__frios">❄ ${frios.length} lead${frios.length!==1?'s':''} sin movimiento</button>`;
  }
  panel.innerHTML = html;
  panel.querySelectorAll('.today-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const lid = btn.dataset.id;
      if (lid === '__frios') {
        document.querySelector('[data-tab="kanban"]').click();
      } else {
        openModal(lid);
      }
    });
  });
}

// ── Quick-add rápido ──────────────────────────────────────
function openQuickAdd() {
  document.querySelectorAll('.modal-bg,.quick-modal-bg').forEach(el => el.remove());
  const bg = document.createElement('div');
  bg.className = 'quick-modal-bg';
  const fuenteOpts = ['','Instagram','Facebook','Referido','WhatsApp','Web','Otro'].map(f=>`<option value="${f}">${f||'— Sin fuente'}</option>`).join('');
  const isCom = VERTICAL === 'comunidades';
  bg.innerHTML = `
    <div class="quick-modal">
      <h2>⚡ Lead rápido</h2>
      <p>Agrega lo básico ahora — puedes completar los detalles después haciendo clic en la tarjeta.</p>
      ${isCom ? `
      <div class="form-row"><label>Edificio / Condominio *</label><input id="qNombre" type="text" placeholder="Condominio Los Aromos" autocomplete="off"></div>
      <div class="form-row"><label>Administrador / Contacto</label><input id="qAdministrador" type="text" placeholder="Nombre del contacto"></div>
      <div class="form-row"><label>Teléfono / WhatsApp</label><input id="qTelefono" type="tel" placeholder="+56 9 1234 5678"></div>` : `
      <div class="form-row"><label>Nombre asegurado *</label><input id="qNombre" type="text" placeholder="Juan Pérez" autocomplete="off"></div>
      <div class="form-row"><label>Teléfono / WhatsApp</label><input id="qTelefono" type="tel" placeholder="+56 9 1234 5678"></div>
      <div class="form-2col">
        <div class="form-row"><label>Marca</label><input id="qMarca" type="text" placeholder="Toyota"></div>
        <div class="form-row"><label>Modelo</label><input id="qModelo" type="text" placeholder="Corolla"></div>
      </div>`}
      <div class="form-row"><label>Fuente</label><select id="qFuente">${fuenteOpts}</select></div>
      <div class="quick-modal-actions">
        <button class="btn-cancelar" id="qCancelar">Cancelar</button>
        <button class="btn-guardar" id="qGuardar">Guardar lead</button>
      </div>
    </div>`;
  document.body.appendChild(bg);
  bg.querySelector('#qNombre').focus();
  bg.querySelector('#qCancelar').onclick = () => bg.remove();
  bg.addEventListener('click', e => { if (e.target === bg) bg.remove(); });
  bg.addEventListener('keydown', e => { if (e.key === 'Escape') bg.remove(); });
  bg.querySelector('#qGuardar').onclick = () => {
    const nombre = bg.querySelector('#qNombre').value.trim();
    if (!nombre) { bg.querySelector('#qNombre').focus(); return; }
    const lead = isCom ? defaultLead({
      edificio:      nombre,
      administrador: bg.querySelector('#qAdministrador').value.trim(),
      telefono:      bg.querySelector('#qTelefono').value.trim(),
      fuente:        bg.querySelector('#qFuente').value,
    }) : defaultLead({
      asegurado: nombre,
      telefono:  bg.querySelector('#qTelefono').value.trim(),
      marca:     (bg.querySelector('#qMarca')||{}).value?.trim()||'',
      modelo:    (bg.querySelector('#qModelo')||{}).value?.trim()||'',
      fuente:    bg.querySelector('#qFuente').value,
    });
    bg.remove();
    STATE[lead.id] = lead;
    fbWrite(lead.id, lead);
    showToast('✓ Lead agregado');
  };
  bg.querySelector('#qNombre').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); bg.querySelector('#qTelefono').focus(); }
  });
}

// ── Vertical switcher ─────────────────────────────────────
function switchVertical(v) {
  if (v === VERTICAL) return;
  VERTICAL = v;
  localStorage.setItem('crm_vertical', v);

  // Update active button
  document.querySelectorAll('.vert-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.v === v);
  });

  // Update search placeholder
  document.getElementById('searchInput').placeholder = VERTICAL_CONFIG[v].searchPlaceholder;

  // Reset filters
  filterSearch=''; filterFuente=''; filterCompania=''; filterDesde=''; filterHasta='';
  document.getElementById('searchInput').value = '';
  document.getElementById('filterFuente').value = '';
  document.getElementById('filterCompania').value = '';
  document.getElementById('filterDesde').value = '';
  document.getElementById('filterHasta').value = '';

  // Reset table header so it rebuilds for new columns
  const thead = document.querySelector('#leadsTable thead');
  if (thead) thead.innerHTML = '';
  sortCol = 'fecha'; sortDir = -1;

  // Reset Kanban board so it rebuilds columns
  document.getElementById('kanbanBoard').innerHTML = '';

  // Switch data source
  const cfg = VERTICAL_CONFIG[v];
  if (USE_FIREBASE && DB_REF) {
    DB_REF.off();
    DB_REF = firebase.database().ref(cfg.firebasePath);
    STATE = {};
    DB_REF.on('value', snap => {
      STATE = snap.val() || {};
      renderAll();
    });
  } else {
    try { STATE = JSON.parse(localStorage.getItem(cfg.storageKey) || '{}'); } catch { STATE = {}; }
    if (!Object.keys(STATE).length) {
      const examples = v === 'comunidades' ? EXAMPLE_LEADS_COM : EXAMPLE_LEADS;
      examples.forEach(l => { STATE[l.id] = l; });
      localStorage.setItem(cfg.storageKey, JSON.stringify(STATE));
    }
    renderAll();
  }
}

document.getElementById('verticalSwitcher').addEventListener('click', e => {
  const btn = e.target.closest('.vert-btn');
  if (btn) switchVertical(btn.dataset.v);
});

// ── Boot ──────────────────────────────────────────────────
// Set initial active button
document.querySelectorAll('.vert-btn').forEach(btn => {
  btn.classList.toggle('active', btn.dataset.v === VERTICAL);
});
document.getElementById('searchInput').placeholder = VERTICAL_CONFIG[VERTICAL].searchPlaceholder;
initStorage();
